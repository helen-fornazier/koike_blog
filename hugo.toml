baseURL = "https://koike.dev.br/"
theme = "hugo-primer-blog"
title = "LN Koike"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableGitInfo = false
enableRobotsTXT = true

[languages]
[languages.en]
contentDir = "content/en"
languageName = "English"
weight = 1

[params]
author = "Helen Koike"
dateFormat = "2006-01-02"
defaultTheme = "auto"
description = "Helen Koike's personal blog — Linux kernel, open source events, and other things I find interesting."
primaryColor = "#0969da"
recentPostsCount = 5
showAuthor = true
showReadingTime = true
showShareButtons = true
sidebar = true
clickySiteId = "101503092"
matomoUrl = "//stats.igalia.com/"
matomoSiteId = "27"
ogImage = "https://koike.dev.br/images/ln-koike.png"

# Giscus comments — generate your values at https://giscus.app/
[params.giscus]
enabled = true
repo = "helen-fornazier/koike_blog"
repoId = "R_kgDORptU0Q"
category = "Announcements"
categoryId = "DIC_kwDORptU0c4C4oS-"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "top"
theme = "preferred_color_scheme"
lang = "en"
loading = "lazy"

[[params.sidebarModules]]
partial = "aboutme"

[[params.sidebarModules]]
partial = "social"

[[params.sidebarModules]]
partial = "rss"

[[params.sidebarModules]]
partial = "recentPosts"

[[params.sidebarModules]]
partial = "tags"

[[params.sidebarModules]]
partial = "archive"

[params.social]
github = "helen-fornazier"
gitlab = "helen-fornazier"
linkedin = "helen-mae-koike-fornazier"

[menus]
[[menus.main]]
name = "Posts"
url = "/posts/"
weight = 1

[[menus.main]]
name = "About"
url = "/about/"
weight = 2

[[menus.main]]
name = "Privacy"
url = "/privacy/"
weight = 3

[taxonomies]
archive = "archives"
tag = "tags"

[markup]
[markup.highlight]
anchorLineNos = false
codeFences = true
guessSyntax = true
lineNos = false
lineNumbersInTable = true
noClasses = false
style = "github"
tabWidth = 4
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS"]
taxonomy = ["HTML"]
term = ["HTML", "RSS"]

[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.5

[frontmatter]
date = ["date", "publishDate", "lastmod"]
lastmod = ["lastmod", ":git", "date", "publishDate"]

[pagination]
pagerSize = 10
