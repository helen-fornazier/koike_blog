{{- if ne $.Params.disableComments true -}}
{{- with site.Params.giscus -}}
{{- if .enabled -}}
<div class="border-top pt-4 mt-4" id="comments">
  <div id="giscus-container">
  <h2 class="f4 mb-3">Comments</h2>
  <script>
    (function () {
      function giscusTheme(colorMode) {
        if (colorMode === 'light') return 'light';
        if (colorMode === 'dark') return 'dark';
        return 'preferred_color_scheme';
      }

      function currentTheme() {
        const stored = localStorage.getItem('theme');
        return giscusTheme(stored);
      }

      function updateGiscus() {
        const iframe = document.querySelector('iframe.giscus-frame');
        if (!iframe) return;
        const colorMode = document.documentElement.getAttribute('data-color-mode');
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: giscusTheme(colorMode) } } },
          'https://giscus.app'
        );
      }

      const script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.setAttribute('data-repo', '{{ .repo }}');
      script.setAttribute('data-repo-id', '{{ .repoId }}');
      script.setAttribute('data-category', '{{ .category }}');
      script.setAttribute('data-category-id', '{{ .categoryId }}');
      script.setAttribute('data-mapping', '{{ .mapping | default "pathname" }}');
      script.setAttribute('data-strict', '{{ .strict | default "0" }}');
      script.setAttribute('data-reactions-enabled', '{{ .reactionsEnabled | default "1" }}');
      script.setAttribute('data-emit-metadata', '{{ .emitMetadata | default "0" }}');
      script.setAttribute('data-input-position', '{{ .inputPosition | default "top" }}');
      script.setAttribute('data-theme', currentTheme());
      script.setAttribute('data-lang', '{{ .lang | default "en" }}');
      {{ with .loading }}script.setAttribute('data-loading', '{{ . }}');{{ end }}
      script.crossOrigin = 'anonymous';
      script.async = true;
      document.getElementById('giscus-container').appendChild(script);

      new MutationObserver(updateGiscus).observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-color-mode'],
      });

      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateGiscus);
      }
    })();
  </script>
  </div>
</div>
{{- end -}}
{{- end -}}
{{- end -}}
