<div class="border rounded-2 p-3 mb-3">
  <h2 class="f5 text-bold mb-2">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" class="octicon mr-1" style="vertical-align: text-bottom; color: #f26522;" aria-hidden="true">
      <path d="M2.002 2.725a.75.75 0 0 1 .797-.699C8.79 2.42 13.58 7.21 13.974 13.2a.75.75 0 0 1-1.497.098 10.502 10.502 0 0 0-9.776-9.776.747.747 0 0 1-.699-.797ZM2.84 7.05h-.002a7.002 7.002 0 0 1 6.113 6.111.75.75 0 0 1-1.49.178 5.503 5.503 0 0 0-4.8-4.8.75.75 0 0 1 .179-1.49ZM2 13a1 1 0 1 1 2 0 1 1 0 0 1-2 0Z"></path>
    </svg>
    RSS Feeds
  </h2>
  <ul class="list-style-none m-0 p-0" style="display: flex; flex-direction: column; gap: 0.35rem;">
    <li>
      <a href="{{ "index.xml" | relURL }}" class="Link--secondary f6">All posts</a>
    </li>
    {{- range site.Taxonomies.tags -}}
    <li>
      <a href="{{ .Page.RelPermalink }}index.xml" class="Link--secondary f6">
        #{{ .Page.Title }}
      </a>
    </li>
    {{- end -}}
  </ul>
</div>
